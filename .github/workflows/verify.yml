name: ✅ 검증

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-guard:
    name: 🛡️ Dependency Guard
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup
        with:
          local-properties: ${{ secrets.LOCAL_PROPERTIES }}
          google-services-dev: ${{ secrets.GOOGLE_SERVICES_DEV }}
          google-services-real: ${{ secrets.GOOGLE_SERVICES_REAL }}

      - name: 🛡️ Dependency Guard 실행
        run: ./gradlew dependencyGuard

  project-guard:
    name: 🛡️ Project Guard
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup
        with:
          local-properties: ${{ secrets.LOCAL_PROPERTIES }}
          google-services-dev: ${{ secrets.GOOGLE_SERVICES_DEV }}
          google-services-real: ${{ secrets.GOOGLE_SERVICES_REAL }}

      - name: 🛡️ Project Guard 실행
        run: ./gradlew projectGuardAggregateCheck

  jvm-test:
    name: ☕ JVM 테스트
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup
        with:
          local-properties: ${{ secrets.LOCAL_PROPERTIES }}
          google-services-dev: ${{ secrets.GOOGLE_SERVICES_DEV }}
          google-services-real: ${{ secrets.GOOGLE_SERVICES_REAL }}

      - name: 🧪 JVM 테스트 실행
        run: ./gradlew jvmTest

  android-host-test:
    name: 🤖 Android Host 테스트
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup
        with:
          local-properties: ${{ secrets.LOCAL_PROPERTIES }}
          google-services-dev: ${{ secrets.GOOGLE_SERVICES_DEV }}
          google-services-real: ${{ secrets.GOOGLE_SERVICES_REAL }}

      - name: 🧪 Android Host 테스트 실행
        run: ./gradlew testAndroidHostTest

  android-device-test:
    name: 📱 Android Device 테스트
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/gradle-setup
        with:
          local-properties: ${{ secrets.LOCAL_PROPERTIES }}
          google-services-dev: ${{ secrets.GOOGLE_SERVICES_DEV }}
          google-services-real: ${{ secrets.GOOGLE_SERVICES_REAL }}

      - name: 🧪 Android Device 테스트 실행
        run: ./gradlew allSdksGroupAndroidDeviceTest
