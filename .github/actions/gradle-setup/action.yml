name: 🛠️ Gradle 설정
description: local.properties, xcconfig, Google Service, Java, Android SDK, Gradle 설정

inputs:
  local-properties:
    description: local.properties 내용
    required: true
  dev-xcconfig:
    description: dev.xcconfig 내용
    required: false
  real-xcconfig:
    description: real.xcconfig 내용
    required: false
  google-services-dev:
    description: google-services.json (dev)
    required: false
  google-services-real:
    description: google-services.json (real)
    required: false
  google-service-info-dev-debug:
    description: GoogleService-Info.plist (DevDebug)
    required: false
  google-service-info-real-debug:
    description: GoogleService-Info.plist (RealDebug)
    required: false
  google-service-info-real-release:
    description: GoogleService-Info.plist (RealRelease)
    required: false

runs:
  using: composite
  steps:
    - name: 📝 local.properties 생성
      shell: bash
      run: echo "${{ inputs.local-properties }}" > local.properties

    - name: 📝 dev.xcconfig 생성
      if: inputs.dev-xcconfig != ''
      shell: bash
      run: echo "${{ inputs.dev-xcconfig }}" > Diary/Diary/dev.xcconfig

    - name: 📝 real.xcconfig 생성
      if: inputs.real-xcconfig != ''
      shell: bash
      run: echo "${{ inputs.real-xcconfig }}" > Diary/Diary/real.xcconfig

    - name: 📝 google-services.json (dev) 생성
      if: inputs.google-services-dev != ''
      shell: bash
      run: |
        mkdir -p app/android/src/dev
        echo '${{ inputs.google-services-dev }}' > app/android/src/dev/google-services.json

    - name: 📝 google-services.json (real) 생성
      if: inputs.google-services-real != ''
      shell: bash
      run: |
        mkdir -p app/android/src/real
        echo '${{ inputs.google-services-real }}' > app/android/src/real/google-services.json

    - name: 📝 GoogleService-Info.plist (DevDebug) 생성
      if: inputs.google-service-info-dev-debug != ''
      shell: bash
      run: |
        mkdir -p Diary/GoogleService/DevDebug
        echo '${{ inputs.google-service-info-dev-debug }}' > Diary/GoogleService/DevDebug/GoogleService-Info.plist

    - name: 📝 GoogleService-Info.plist (RealDebug) 생성
      if: inputs.google-service-info-real-debug != ''
      shell: bash
      run: |
        mkdir -p Diary/GoogleService/RealDebug
        echo '${{ inputs.google-service-info-real-debug }}' > Diary/GoogleService/RealDebug/GoogleService-Info.plist

    - name: 📝 GoogleService-Info.plist (RealRelease) 생성
      if: inputs.google-service-info-real-release != ''
      shell: bash
      run: |
        mkdir -p Diary/GoogleService/RealRelease
        echo '${{ inputs.google-service-info-real-release }}' > Diary/GoogleService/RealRelease/GoogleService-Info.plist

    - name: ☕ Java 설정
      uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 21

    - name: 📱 Android SDK 설정
      uses: android-actions/setup-android@v4

    - name: 🐘 Gradle 설정
      uses: gradle/actions/setup-gradle@v5
      with:
        build-scan-publish: true
        build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
        build-scan-terms-of-use-agree: "yes"
