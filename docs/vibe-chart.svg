    stroke-dasharray="395.84 43.98" stroke-dashoffset="109.96"
    transform="rotate(-90 100 90)"/>
  <!-- 코딩 10% (초록) -->
  <circle cx="100" cy="90" r="70" fill="none" stroke="#34d399" stroke-width="24"
    stroke-dasharray="43.98 395.84" stroke-dashoffset="109.96"
