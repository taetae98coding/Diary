  <!-- 가운데 배경 -->
  <circle cx="100" cy="90" r="55" fill="white"/>
  <!-- 텍스트 -->
  <text x="100" y="85" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="700" fill="#1a1a1a">1 : 9</text>
  <text x="100" y="105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#555">코딩 : 바이브</text>
  <!-- 범례 -->
  <circle cx="28" cy="205" r="5" fill="#34d399"/>
  <text x="38" y="209" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#555">코딩 10%</text>
  <circle cx="105" cy="205" r="5" fill="#6366f1"/>
  <text x="115" y="209" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#555">바이브 코딩 90%</text>
</svg>
